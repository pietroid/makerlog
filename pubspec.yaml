name: makerlog
description: Makerlog CLI
version: 0.2.0
publish_to: none

environment:
  sdk: ^3.9.0

dependencies:
  # The framework lives in-tree as a path package so edits there
  # hot-reload alongside the app.
  fly:
    path: packages/fly
  fly_bloc:
    path: packages/fly_bloc
  app_ui:
    path: packages/app_ui
  equatable: ^2.0.8
  ollama_dart: ^2.1.0

dev_dependencies:
  lints: ^3.0.0
