name: makerlog
description: Makerlog CLI
version: 0.2.0
publish_to: none

environment:
  sdk: ^3.0.0

dependencies:
  # The framework lives in-tree as a path package so edits there
  # hot-reload alongside the app.
  clitter:
    path: packages/clitter
  clitter_bloc:
    path: packages/clitter_bloc
  app_ui:
    path: packages/app_ui
  equatable: ^2.0.8

dev_dependencies:
  lints: ^3.0.0
